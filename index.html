<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOUR48 REPLAY </title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e84118; --accent: #fbc531; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.07); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #fff; margin: 0; min-height: 100vh; background-image: radial-gradient(circle at 20% 20%, #3a0a0a 0%, transparent 40%); }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .brand { font-weight: 800; font-size: 18px; letter-spacing: 1px; }
        .brand span { color: var(--primary); }

        #memberStatus { font-size: 11px; font-weight: 800; background: var(--glass); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--primary); cursor: pointer; transition: 0.3s; }

        .container { max-width: 500px; margin: auto; padding: 15px; padding-bottom: 100px; }

        .v-card { background: var(--glass); border-radius: 28px; overflow: hidden; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .v-player { position: relative; padding-bottom: 56.25%; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .v-lock { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 20px; text-align: center; }
        .lock-tag { font-size: 10px; letter-spacing: 2px; color: var(--accent); font-weight: 800; margin-bottom: 15px; }

        .btn-main { background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; font-size: 13px; }
        .btn-sub { background: none; border: 1px solid #555; color: #aaa; padding: 8px 15px; border-radius: 50px; font-size: 11px; margin-top: 10px; cursor: pointer; }

        .v-info { padding: 20px; }
        .v-date { font-size: 11px; color: var(--accent); font-weight: 800; margin-bottom: 5px; display: block; }
        .v-title { font-size: 18px; font-weight: 700; margin: 0; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 10px; font-size: 10px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: 800; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #fff; color: #000; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 15px; font-family: inherit; font-size: 14px; }
        
        .qris-img { width: 100%; border-radius: 15px; margin: 15px 0; border: 1px dashed #ccc; padding: 10px; }
        .btn-wa { background: #25d366; color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 800; text-decoration: none; display: block; margin-top: 10px; }

        .fab { position: fixed; bottom: 25px; right: 25px; background: var(--primary); width: 55px; height: 55px; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 25px rgba(232, 65, 24, 0.4); z-index: 99; }
    </style>
</head>
<body>

<header>
    <div class="brand">FOUR<span>48</span> REPLAY</div>
    <div id="memberStatus" onclick="loginMember()">LOGIN MEMBER</div>
</header>

<div class="container" id="videoList">
    <p style="text-align:center; margin-top:100px; opacity:0.3; font-weight:800;">SYNCING DATABASE...</p>
</div>

<div id="payModal" class="modal">
    <div class="modal-box">
        <h3 id="payTitle" style="margin:0;">Checkout Show</h3>
        <img src="https://files.catbox.moe/rufldj.jpg" class="qris-img">
        <div style="font-size:24px; font-weight:800; color:var(--primary);">Rp 2.000</div>
        <p style="font-size:11px; color:#777; margin:10px 0;">Scan QRIS Pakasir di atas, lalu kirim bukti transfer untuk mendapatkan token.</p>
        <a id="waLink" href="#" target="_blank" class="btn-wa">KONFIRMASI BAYAR</a>
        <button onclick="closeModal('payModal')" style="background:none; border:none; margin-top:15px; color:#aaa; font-weight:600; cursor:pointer;">Batal</button>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-box" style="text-align:left;">
        <h3 style="margin-top:0;">Management Panel</h3>
        <input type="date" id="addDate">
        <input type="text" id="addTitle" placeholder="Judul Show">
        <input type="text" id="addUrl" placeholder="Link YouTube/Drive">
        <input type="text" id="addLineup" placeholder="Lineup Member">
        <div style="display:flex; gap:10px;">
            <input type="text" id="addToken" placeholder="Token Akses">
            <button onclick="genToken()" style="margin-top:8px; border-radius:12px; padding:0 15px; border:1px solid #ddd; cursor:pointer;">ACAK</button>
        </div>
        <button onclick="publish()" id="btnPub" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:800; margin-top:10px; cursor:pointer;">PUBLISH SHOW</button>
        <button onclick="closeModal('adminModal')" style="width:100%; background:none; border:none; margin-top:15px; color:#aaa; cursor:pointer;">Close</button>
    </div>
</div>

<div class="fab" onclick="checkAdmin()">⚙️</div>

<script>
    const API = 'https://sheetdb.io/api/v1/ykyv45ki837mg';
    const WA_NUMBER = "6287722195260"; // Ganti dengan NO WA Kamu
    let db = [];

    // --- LOGIKA MEMBERSHIP 30 HARI ---
    function isVipActive() {
        const expiry = localStorage.getItem('f48_expiry');
        if (expiry && new Date().getTime() < expiry) return true;
        localStorage.removeItem('f48_expiry');
        return false;
    }

    function loginMember() {
        const pass = prompt("Masukkan Password Membership 30 Hari:");
        if(pass === "membership") {
            const expiry = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
            localStorage.setItem('f48_expiry', expiry);
            alert("Membership Aktif! Silakan nikmati Replay.");
            location.reload();
        } else { alert("Password Salah!"); }
    }

    async function load() {
        try {
            const res = await fetch(API);
            db = await res.json();
            render();
            updateHeader();
        } catch (e) { console.error("Database Error"); }
    }

    function render() {
        const cont = document.getElementById('videoList');
        const vipStatus = isVipActive();
        const isAdmin = sessionStorage.getItem('f48_admin');

        cont.innerHTML = db.map(v => {
            const unlocked = vipStatus || localStorage.getItem('unlocked_'+v.id);
            return `
            <div class="v-card">
                <div class="v-player">
                    ${!unlocked ? `
                        <div class="v-lock">
                            <span class="lock-tag">PREMIUM ARCHIVE</span>
                            <button class="btn-main" onclick="openPay('${v.title}')">BUY REPLAY</button>
                            <button class="btn-sub" onclick="inputToken('${v.token}', '${v.id}')">USE TOKEN</button>
                        </div>
                    ` : `<iframe src="${processLink(v.url)}?autoplay=1" allowfullscreen></iframe>`}
                </div>
                <div class="v-info">
                    <span class="v-date">${v.date || 'NO DATE'}</span>
                    <h3 class="v-title">${v.title}</h3>
                    <p style="font-size:12px; color:#777; margin-top:8px;">${v.lineup}</p>
                    ${isAdmin ? `<button class="btn-del" onclick="hapusShow('${v.id}')">HAPUS SHOW DARI DATABASE</button>` : ''}
                </div>
            </div>`;
        }).reverse().join('');
    }

    function inputToken(correct, id) {
        if(prompt("Masukkan Token:").toUpperCase() === correct) {
            localStorage.setItem('unlocked_'+id, 'true');
            render();
        } else { alert("Token Salah!"); }
    }

    function openPay(title) {
        document.getElementById('payTitle').innerText = title;
        document.getElementById('payModal').style.display = 'flex';
        const msg = encodeURIComponent(`Halo Admin FOUR48, saya ingin beli REPLAY: ${title}. Mohon info tokennya.`);
        document.getElementById('waLink').href = `https://wa.me/${WA_NUMBER}?text=${msg}`;
    }

    async function hapusShow(id) {
        if(!confirm("Yakin ingin menghapus? Data di Google Sheets akan hilang.")) return;
        await fetch(`${API}/id/${id}`, { method: 'DELETE' });
        location.reload();
    }

    function genToken() {
        document.getElementById('addToken').value = "F48-" + Math.random().toString(36).substr(2, 6).toUpperCase();
    }

    async function publish() {
        const btn = document.getElementById('btnPub');
        const data = { data: [{
            id: "vid_" + Date.now(),
            date: document.getElementById('addDate').value,
            title: document.getElementById('addTitle').value,
            url: document.getElementById('addUrl').value,
            lineup: document.getElementById('addLineup').value,
            token: document.getElementById('addToken').value.toUpperCase(),
        }]};
        btn.innerText = "Publishing...";
        await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
        location.reload();
    }

    function checkAdmin() {
        if(prompt("Admin Key:") === "jkt48oke") {
            sessionStorage.setItem('f48_admin', 'true');
            document.getElementById('adminModal').style.display = 'flex';
            render();
        }
    }

    function updateHeader() {
        if(isVipActive()) {
            const sisa = Math.ceil((localStorage.getItem('f48_expiry') - new Date().getTime()) / (1000*60*60*24));
            document.getElementById('memberStatus').innerText = `VIP: ${sisa} HARI ⭐`;
        }
    }

    function processLink(url) {
        if(url.includes('youtu')) return `https://www.youtube.com/embed/${url.includes('v=')?url.split('v=')[1].split('&')[0]:url.split('/').pop()}`;
        return `https://drive.google.com/file/d/${url.split('/d/')[1].split('/')[0]}/preview`;
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    window.onload = load;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOUR48 REPLAY</title>
    <style>
        :root { --primary: #e84118; --bg: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        header { background: var(--primary); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        
        /* Admin Panel */
        #adminPanel { background: #fff; color: #000; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; box-shadow: 0 10px 30px rgba(232,65,24,0.3); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        /* Video Card */
        .video-card { background: #1a1a1a; border-radius: 15px; overflow: hidden; margin-bottom: 25px; border: 1px solid #333; }
        .player-area { position: relative; padding-bottom: 56.25%; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* Effect Preview Blur */
        .preview-visual { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: blur(15px) brightness(0.4); transform: scale(1.1); pointer-events: none; background-size: cover; background-position: center; }
        
        .locked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-unlock { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(232, 65, 24, 0.4); }
        
        .info-area { padding: 15px; }
        .title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .lineup { font-size: 12px; color: #aaa; background: #252525; padding: 8px; border-radius: 6px; }
    </style>
</head>
<body>

<header>
    <div style="width:50px"></div>
    <h2 style="margin:0; font-size: 16px; letter-spacing: 1px;">FOUR48 REPLAY</h2>
    <button onclick="loginAdmin()" style="background:none; border:1px solid white; color:white; border-radius:5px; font-size:10px; padding:5px 10px; cursor:pointer;">ADMIN</button>
</header>

<div class="container">
    <div id="adminPanel">
        <h3 style="margin-top:0;">Tambah Video Baru</h3>
        <input type="text" id="title" placeholder="Judul Video">
        <input type="text" id="url" placeholder="Link YouTube atau Google Drive">
        <input type="text" id="lineup" placeholder="Lineup Member">
        <input type="text" id="token" placeholder="Token Akses (Contoh: VIP-ZEE)">
        <button onclick="sendData()" id="btnSend" style="width:100%; padding:12px; background:green; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:10px;">UPLOAD KE DATABASE</button>
    </div>

    <div id="videoContainer">
        <p style="text-align:center; margin-top:50px; opacity:0.5;">Sinkronisasi Database Global...</p>
    </div>
</div>

<script>
    // API URL MILIK KAMU
    const API_URL = 'https://sheetdb.io/api/v1/ykyv45ki837mg';
    
    let unlockedList = [];
    let videoDataGlobal = [];

    // 1. FUNGSI AMBIL DATA DARI EXCEL
    async function loadData() {
        try {
            const response = await fetch(API_URL);
            videoDataGlobal = await response.json();
            render(videoDataGlobal);
        } catch (err) {
            document.getElementById('videoContainer').innerHTML = "Gagal memuat data. Pastikan API SheetDB aktif.";
        }
    }

    // 2. FUNGSI KIRIM DATA DARI WEB KE EXCEL
    async function sendData() {
        const btn = document.getElementById('btnSend');
        const payload = {
            data: [{
                id: "ID-" + Date.now(),
                title: document.getElementById('title').value,
                url: document.getElementById('url').value,
                lineup: document.getElementById('lineup').value,
                token: document.getElementById('token').value.toUpperCase()
            }]
        };

        if(!payload.data[0].title || !payload.data[0].url) return alert("Harap isi Judul dan Link!");
        
        btn.innerText = "Sedang Mengirim...";
        btn.disabled = true;

        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert("Berhasil! Video otomatis muncul di HP semua orang.");
            location.reload();
        } catch (e) {
            alert("Gagal mengirim data.");
            btn.innerText = "UPLOAD KE DATABASE";
            btn.disabled = false;
        }
    }

    // 3. TAMPILKAN VIDEO KE LAYAR
    function render(videos) {
        const cont = document.getElementById('videoContainer');
        if(videos.length === 0) {
            cont.innerHTML = "<p style='text-align:center; opacity:0.5;'>Belum ada video di database.</p>";
            return;
        }

        cont.innerHTML = videos.map(v => {
            const isLocked = !unlockedList.includes(v.id);
            const vInfo = processUrl(v.url.trim());

            return `
            <div class="video-card">
                <div class="player-area">
                    ${isLocked ? `
                        ${vInfo.preview}
                        <div class="locked-overlay">
                            <button class="btn-unlock" onclick="inputToken('${v.id}', '${v.token}')">INPUT TOKEN AKSES</button>
                        </div>
                    ` : `
                        <iframe src="${vInfo.embed}?autoplay=1" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
                    `}
                </div>
                <div class="info-area">
                    <div class="title">${v.title}</div>
                    <div class="lineup">Member: ${v.lineup}</div>
                </div>
            </div>`;
        }).reverse().join(''); // Video terbaru muncul paling atas
    }

    // 4. DETEKSI LINK YT / DRIVE
    function processUrl(url) {
        if (url.includes('youtube') || url.includes('youtu.be')) {
            const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
            return { 
                embed: `https://www.youtube.com/embed/${id}`, 
                preview: `<iframe class="preview-visual" src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=0"></iframe>` 
            };
        } else {
            const id = url.split('/d/')[1].split('/')[0];
            return { 
                embed: `https://drive.google.com/file/d/${id}/preview`, 
                preview: `<div class="preview-visual" style="background-image: url('https://pbs.twimg.com/media/Fj78_80aYAAn_9s?format=jpg&name=large');"></div>` 
            };
        }
    }

    // 5. CEK TOKEN
    function inputToken(id, correctToken) {
        const input = prompt("Masukkan Token Khusus Video Ini:").toUpperCase();
        if(input === correctToken || input === "JKT48-ADMIN") {
            unlockedList.push(id);
            render(videoDataGlobal);
        } else {
            alert("Token Salah!");
        }
    }

    function loginAdmin() {
        if(prompt("Password Admin:") === "jkt48oke") {
            document.getElementById('adminPanel').style.display = 'block';
            window.scrollTo(0,0);
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
